<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>introduction to javascript</title>
</head>
<body>
    <h1>Elderflower</h1>
    <div id="content">
        <div id="greeting" class="message">Hello!</div>
            <table>
                <tr>
                    <td>Custom sign: </td>
                    <td id="userSign" > John Doe</td>
                </tr>
                <tr>
                    <td>Total tiles:</td>
                    <td id="tiles"></td>
                </tr>
                <tr>
                    <td>Subtotal:</td>
                    <td id="subtotal">$</td>
                </tr>
                <tr>
                    <td>Shipping</td>
                    <td id="shipping">$5</td>
                </tr>
                <tr>
                    <td>Grand total:</td>
                    <td id="grandtotal">$</td>
                </tr>
            </table>
    </div>

    <script src="assets/js/function.js"></script>
    <script src="assets/js/array.js"></script>
    
    <script>
        let today = new Date()
        const hour = today.getHours()
        let greetings = document.getElementById('greeting')
        const userSign = document.getElementById('userSign')
        const tiles = document.getElementById('tiles')
        const subtotal = document.getElementById('subtotal') 
        const shipping = document.getElementById('shipping')
        const grandtotal = document.getElementById('grandtotal')
        let size = 0

        if (hour > 18){
            greetings.textContent += 'Good evening'
        }else if(hour > 12) {
            greetings.textContent += 'Good afternoon'
        }else if (hour > 0){
            greetings.textContent += 'Good Morning'
        }else{
            greetings.textContent = 'Welcome'
        }
        
 
        document.write(greetings.textContent)
        size = userSign.textContent.length
        tiles.textContent = size

        subtotal.textContent += size * 2.5
        
        grandtotal.textContent = parseInt(subtotal.textContent.replace('$','')) + parseInt(shipping.textContent.replace('$',''))
        

        
    </script>

</body>
</html>

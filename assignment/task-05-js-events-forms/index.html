<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Contact Us</h1>

    <form id="contactForm" novalidate>

        <!-- Name -->
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name">
            <small class="message" id="nameMsg"></small>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
            <small class="message" id="emailMsg"></small>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password">
            <small class="message" id="passwordMsg"></small>
        </div>

        <!-- Message -->
        <div class="form-group">
            <label>Message</label>
            <textarea id="message"></textarea>
            <small class="message" id="messageMsg"></small>
        </div>

        <button type="submit">Send</button>

    </form>
    <!-- Success Message (hidden by default) -->
<div id="successMessage" class="success-box" style="display: none;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
